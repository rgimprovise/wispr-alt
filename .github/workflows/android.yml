# GitHub Actions — builds an unsigned debug APK for the wispr-alt Android
# keyboard. Artifact can be sideloaded on any phone that has
# "Install unknown apps" enabled for the browser/file manager.
#
# Triggers: push of v* tag, or manual dispatch. Runs independently from
# the desktop build workflow.
#
# To use the backend URL baked in at compile time, set WISPR_BACKEND_URL
# as a repo secret. If absent it falls back to the production VPS URL.

name: android

on:
  push:
    tags: ["android-v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}

      - name: Install Gradle
        run: |
          curl -sSL https://services.gradle.org/distributions/gradle-8.10-bin.zip -o /tmp/gradle.zip
          mkdir -p $HOME/gradle
          unzip -q /tmp/gradle.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.10/bin" >> $GITHUB_PATH

      - name: Build debug APK
        working-directory: android
        env:
          WISPR_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL || 'https://alrcvscribe.n8nrgimprovise.space' }}
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk
