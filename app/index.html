<!doctype html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Беловик</title>

    <!-- Belovik typography: Manrope (UI) + Fraunces (display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Fraunces:opsz,wght,SOFT@9..144,400..700,0..100&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <link rel="stylesheet" href="/src/tokens.css" />
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="container">
      <header class="brand">
        <div class="brand__mark" aria-hidden="true"></div>
        <div class="brand__lockup">
          <div class="t-h1">Беловик</div>
          <div class="t-caption">Голосовой интерфейс для работы с текстом</div>
        </div>
      </header>

      <p class="hint">
        Нажмите <kbd class="kcap" id="hotkey-hint">F5</kbd> в любом приложении для записи.
      </p>

      <div id="status" class="status status--idle">
        <span class="status__dot"></span>
        <span class="status__label">готов</span>
      </div>

      <section class="settings">
        <div class="t-caption">Настройки</div>
        <div class="setting-row">
          <div class="setting-row__label">
            <div class="setting-row__title">Глобальный хоткей</div>
            <div class="setting-row__hint">Нажмите кнопку и введите новое сочетание клавиш</div>
          </div>
          <button id="hotkey-picker" class="btn btn--secondary hotkey-picker">
            <span id="hotkey-picker-label">F5</span>
          </button>
        </div>
      </section>

      <div class="row">
        <button id="test-paste" class="btn btn--secondary">Проверить вставку</button>
      </div>

      <div class="log-wrap">
        <div class="t-caption">Лог</div>
        <pre id="log"></pre>
      </div>
    </main>
  </body>
</html>
