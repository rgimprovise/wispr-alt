<!doctype html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Беловик</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link rel="stylesheet" href="/src/tokens.css" />
    <link rel="stylesheet" href="/src/overlay.css" />
    <script type="module" src="/src/overlay.ts" defer></script>
  </head>
  <body>
    <div id="pill" class="pill" data-state="idle">
      <!-- Header row: state chip · language · waveform · timer -->
      <div class="pill__head">
        <div class="state-chip">
          <span class="state-dot"></span>
          <span class="state-label" id="state-label">Готов</span>
        </div>
        <span class="lang-hint">RU</span>
        <div class="spacer"></div>
        <div class="waveform" id="waveform" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
          <span></span><span></span>
        </div>
        <span class="timer" id="timer">0:00</span>
      </div>

      <!-- Live transcript with teletype scroll + caret -->
      <div class="pill__transcript">
        <div id="window" class="text-window">
          <div id="text" class="text"></div>
        </div>
        <span id="caret" class="caret" aria-hidden="true"></span>
      </div>

      <!-- Footer row: hotkey hints -->
      <div class="pill__foot">
        <span class="foot-label" id="foot-label">Удерживайте чтобы записать</span>
        <div class="spacer"></div>
        <kbd class="kcap">fn</kbd>
        <kbd class="kcap">Space</kbd>
      </div>
    </div>
  </body>
</html>
