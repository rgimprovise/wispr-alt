<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/tokens.css" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wispr-alt</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="container">
      <div class="brand">
        <div class="brand__mark"></div>
        <div>
          <div class="t-h1">ALRCV</div>
          <div class="t-caption">wispr-alt · dev</div>
        </div>
      </div>

      <p class="hint">
        Нажмите <kbd class="kcap" id="hotkey-hint">F5</kbd> в любом приложении для записи.
      </p>

      <div id="status" class="status status--idle">
        <span class="status__dot"></span>
        <span class="status__label">idle</span>
      </div>

      <!-- Settings: hotkey picker -->
      <section class="settings">
        <div class="t-caption">Настройки</div>
        <div class="setting-row">
          <div class="setting-row__label">
            <div class="setting-row__title">Глобальный хоткей</div>
            <div class="setting-row__hint">Нажмите кнопку и введите новое сочетание клавиш</div>
          </div>
          <button id="hotkey-picker" class="btn btn--secondary hotkey-picker">
            <span id="hotkey-picker-label">F5</span>
          </button>
        </div>
      </section>

      <div class="row">
        <button id="test-paste" class="btn btn--secondary">Test paste injection</button>
      </div>

      <div class="log-wrap">
        <div class="t-caption">Лог</div>
        <pre id="log"></pre>
      </div>
    </main>
  </body>
</html>
