<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wispr-alt overlay</title>
    <link rel="stylesheet" href="/src/tokens.css" />
    <link rel="stylesheet" href="/src/overlay.css" />
    <script type="module" src="/src/overlay.ts" defer></script>
  </head>
  <body>
    <div id="pill" class="pill pill--idle" data-state="idle">
      <!-- Header row: state chip · language · timer · waveform -->
      <div class="pill__head">
        <span class="state-chip">
          <span class="state-dot"></span>
          <span class="state-label" id="state-label">Готов</span>
        </span>
        <span class="lang-hint">RU · Auto</span>
        <div class="spacer"></div>
        <span class="timer" id="timer">0:00</span>
        <div class="waveform" id="waveform">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
          <span></span><span></span>
        </div>
      </div>

      <!-- Live transcript with teletype scroll + caret -->
      <div class="pill__transcript">
        <div id="window" class="text-window">
          <div id="text" class="text"></div>
        </div>
        <span id="caret" class="caret" aria-hidden="true"></span>
      </div>

      <!-- Footer row: hotkey hints -->
      <div class="pill__foot">
        <span class="foot-label">Нажать</span>
        <kbd class="kcap">F5</kbd>
        <span class="foot-label foot-label--right">чтобы закончить</span>
      </div>
    </div>
  </body>
</html>
