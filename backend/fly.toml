# Fly.io config for the wispr-alt backend.
#
# Before first deploy:
#   1. flyctl auth login
#   2. cd backend
#   3. flyctl launch --no-deploy --name wispr-alt   (creates the app; if the
#      name is taken, change `app` below to something unique)
#   4. flyctl secrets set GROQ_API_KEY=gsk_your_key
#   5. flyctl deploy
#
# Subsequent deploys:
#   flyctl deploy

app = "wispr-alt"
primary_region = "fra"  # Frankfurt — low latency from RU/EU. Change if needed.

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"       # scale to zero when idle
  auto_start_machines = true        # wake on incoming request
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
