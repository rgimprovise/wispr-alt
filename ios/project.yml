# XcodeGen spec — generates Belovik.xcodeproj from this declarative
# config. Avoids checking in the cumbersome Xcode project files.
#
# Usage:
#   brew install xcodegen
#   cd ios && xcodegen
#   open Belovik.xcodeproj
name: Belovik
options:
  bundleIdPrefix: com.wispralt
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ru

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    # Each developer fills in their own DEVELOPMENT_TEAM through
    # Xcode → Signing & Capabilities → Team. Free Apple ID works.
    DEVELOPMENT_TEAM: ""

configFiles:
  Debug: Configs/Debug.xcconfig
  Release: Configs/Release.xcconfig

targets:
  Belovik:
    type: application
    platform: iOS
    sources:
      - path: wispr-alt
    info:
      path: wispr-alt/Info.plist
      properties:
        CFBundleDisplayName: Беловик
        CFBundleName: Беловик
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Беловик нужен микрофон для записи и транскрипции вашей речи."
        CFBundleURLTypes:
          - CFBundleURLName: com.wispralt.app
            CFBundleURLSchemes:
              - wispralt
        UIBackgroundModes:
          - audio
        WISPR_BACKEND_URL: $(WISPR_BACKEND_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wispralt.app
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
    dependencies:
      - target: BelovikKeyboard

  BelovikKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: wispr-alt-keyboard
    info:
      path: wispr-alt-keyboard/Info.plist
      properties:
        CFBundleDisplayName: Беловик
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: ru-RU
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wispralt.app.keyboard
